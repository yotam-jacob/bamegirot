<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Handles (drawn first so body sits on top at attachment points) -->
  <path d="M11 8 C5 9 4 13 6 17" fill="none" stroke="#7d3515" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M21 8 C27 9 28 13 26 17" fill="none" stroke="#7d3515" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Vase body -->
  <path d="M12 2 L20 2 L20 5 C23 6 26 9 27 13 C28 17 28 21 26 25 C25 27 23 29 21 29 L11 29 C9 29 7 27 6 25 C4 21 4 17 5 13 C6 9 9 6 12 5 Z" fill="#c4682a"/>

  <!-- Decorative band across middle -->
  <rect x="6" y="17" width="20" height="4.5" fill="#7d3515" opacity="0.28" rx="0.5"/>

  <!-- Gold diamond ornaments on band -->
  <polygon points="11,17 13,19.5 11,22 9,19.5" fill="#c49a2e"/>
  <polygon points="19,17 21,19.5 19,22 17,19.5" fill="#c49a2e"/>

  <!-- Small dot between diamonds -->
  <circle cx="16" cy="19.5" r="1.3" fill="#c49a2e"/>

  <!-- Rim at top -->
  <rect x="11" y="1" width="10" height="2.5" rx="1.2" fill="#7d3515"/>

  <!-- Base foot -->
  <rect x="9" y="28.5" width="14" height="2.2" rx="1" fill="#7d3515"/>

  <!-- Soft inner highlight (cartoon gloss) -->
  <ellipse cx="12.5" cy="11" rx="1.5" ry="4.5" fill="white" opacity="0.14"/>
</svg>
